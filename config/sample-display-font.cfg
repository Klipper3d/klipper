# This file provides example configuration for custom OLED text fonts.
#
# To use it, copy the [display_font] section into printer.cfg and then
# add "font: <name>" to your existing [display] section.
#
# See docs/Config_Reference.md for parameter descriptions.

[display_font my_oled_font]
format: bdf
font_file: fonts/FreeMono-10x24-ascii.bdf
cell_width: 10
cell_height: 24
baseline: 18
charset: ascii
#rows_override: 1

# Example [display] additions for SSD1306:
#
#[display]
#lcd_type: ssd1306
#height: 32
#font: my_oled_font

# Example [display] additions for SH1106:
#
#[display]
#lcd_type: sh1106
#height: 64
#x_offset: 0
#font: my_oled_font
