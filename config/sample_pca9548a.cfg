[mcu host_temperature_sensors]
serial: / dev / serial / by - id / usb - Klipper_rp2040_503558607A9B361F - if00

[pca9548a host_temperature_sensors]
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 112
i2c_speed: 100000

[i2c_scanner host_temperature_sensors]
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_speed: 100000
mux_enable: True
mux_addresses: 112
mux_channels: 0, 1, 2, 3, 4, 5, 6, 7
mux_health_check: False
mux_disable_between_channels: True
mux_channel_settle: 0.002
mux_post_disable: 0.001
scan_min_interval: 0.5
mux_sections: host_temperature_sensors

[i2c_router]
debug: True
map:
    mushroom_plant_1 = host_temperature_sensors: 0
    mushroom_plant_2 = host_temperature_sensors: 1
    mushroom_plant_3 = host_temperature_sensors: 2
    mushroom_plant_4 = host_temperature_sensors: 3
    co2 = host_temperature_sensors: 4

[mlx90614]
[scd30]

[temperature_sensor mushroom_plant_1]
sensor_type: MLX90614
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 90
mlx90614_channel: object
min_temp: -40
max_temp: 300

[temperature_sensor mushroom_plant_2]
sensor_type: MLX90614
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 90
mlx90614_channel: object
min_temp: -40
max_temp: 300

[temperature_sensor mushroom_plant_3]
sensor_type: MLX90614
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 90
mlx90614_channel: object
min_temp: -40
max_temp: 300

[temperature_sensor mushroom_plant_4]
sensor_type: MLX90614
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 90
mlx90614_channel: object
min_temp: -40
max_temp: 300

[temperature_sensor co2]
sensor_type: SCD30
i2c_mcu: host_temperature_sensors
i2c_bus: i2c0d
i2c_address: 97
i2c_speed: 100000
report_time: 2.0
min_temp: -40
max_temp: 85
