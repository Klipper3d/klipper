
[include mainsail.cfg]
# ============================================================
# NRC 机械臂 3D 打印系统配置示例
# ============================================================
#
# 版本: 2.1 (2025-01-26)
# 更新: 修复欧拉角顺序转换（ZYX→XYZ），支持标准 Slicer 输出的 ABC 参数
#
# 功能: NRC 工业机械臂与 Klipper 3D 打印固件深度集成
#
# 核心特性:
# - "无步进电机"架构：XYZ 轴由机械臂执行，E 轴保持 MCU 控制
# - 基于 TrapQ 的轨迹数据提取和采样
# - 毫秒级时间同步（机械臂与挤出机协同）
# - 动态姿态打印支持（四元数 SLERP 插值）
# - 自动欧拉角顺序转换（ZYX→XYZ，适配 NRC 机械臂）
#
# 使用说明：
# 1. 复制本文件到 ~/printer_data/config/printer.cfg
# 2. 根据实际硬件修改配置参数
# 3. 特别注意修改 [mcu] 的 serial 路径
# 4. 根据实际机械臂 IP 修改 robot_ip
# 5. 在机械臂示教器中设置用户坐标系
[track_record_verify]
# ====== 打印机基础配置 ======
[printer]
kinematics: nrc_robot_arm
max_velocity: 300
max_accel: 3000
# max_accel_to_decel: 1500  # 可选，默认为 max_accel 的一半

# ===== NRC 机械臂连接参数（必需） =====
robot_ip: 192.168.1.13          # 机械臂 IP 地址
robot_port: 6001                # 控制端口（字符串格式）

# ===== 工作空间限制（必需） =====
# 定义机械臂末端的安全工作空间（用户坐标系）
# 这些边界已经过安全标定，是机械臂末端的安全工作空间
position_min_x: -400
position_max_x: 400
position_min_y: -4400
position_max_y: 400
position_min_z: 0
position_max_z: 300

# ===== 归零点配置（必需） =====
# 归零点是安全起始位置，避免碰撞打印平台
# 单位：mm（用户坐标系）
home_position_x: 0.0
home_position_y: 0.0
home_position_z: 0.0              # 归零点 Z 坐标

# ===== 速度和加速度限制 =====
max_speed_mmps: 60.0              # 最大速度（mm/s），默认 50.0
max_accel_mmps2: 1000.0           # 最大加速度（mm/s²），默认 3000.0


# ====== 真实挤出机配置 ======
# 挤出机使用真实的步进电机和 MCU 连接
# 通过标准的 IterSolve 机制生成步进脉冲
[extruder]
# 步进电机引脚配置（RP2040 实际引脚）
step_pin: gpio2
dir_pin: !gpio3
enable_pin: !gpio4
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3.433
step_pulse_duration: 0.000002

# 挤出参数
nozzle_diameter: 0.400
filament_diameter: 1.75

# 加热器配置（使用 MCU 温度传感器，避免实际加热）
heater_pin: gpio14              
sensor_pin: gpio29            
sensor_type: Generic 3950     
# sensor_type: EPCOS 100K B57560G104F  # 使用 MCU 温度充当热端温度
sensor_pin: gpio29

# PID 参数
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114

# 温度限制（适配 MCU 温度范围 20-60°C）
min_extrude_temp: 0             
min_temp: -100
max_temp: 300
max_power: 1.0

# 挤出限制
max_extrude_only_distance: 300
max_extrude_cross_section: 3.0

# 压力提前
pressure_advance: 0.001
pressure_advance_smooth_time: 0.001

# ====== TMC2209 驱动配置 ======
[tmc2209 extruder]
uart_pin: gpio1
run_current: 0.60               # 运行电流
hold_current: 0.60              # 保持电流
sense_resistor: 0.110
interpolate: true
stealthchop_threshold: 0        # 0=全程 spreadCycle，适合挤出机

[heater_bed]       #####热床
heater_pin: gpio15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio28
# PWM最大输出功率
max_power: 1
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: -110
max_temp: 1000

# ====== MCU 配置 ======
# MCU 仅用于控制挤出机和其他外设
# XYZ 运动由机械臂控制
[mcu]
# RP2040 实际串口路径
serial: /dev/serial/by-id/usb-Klipper_rp2040_E66390C6831D3F26-if00

# ====== 打印冷却风扇 ======
[fan]
pin: gpio23

# ====== 热端风扇 ======
[heater_fan hotend_fan]
pin: gpio24
heater: extruder
heater_temp: 50.0

# ====== 虚拟 SD 卡 ======
# 用于从文件打印（必需，用于支持打印功能）
[virtual_sdcard]
path: ~/printer_data/gcodes

# ====== 显示支持 ======
# 用于显示打印状态（必需，用于支持打印功能）
[display_status]

# ====== 暂停/恢复支持 ======
# 用于暂停和恢复打印（必需，用于支持打印功能）
[pause_resume]

# ====== 打印宏 ======
# 打印开始宏
[gcode_macro START_PRINT]
description: 打印开始时执行的宏
gcode:
    # 连接机械臂（如果尚未连接）
    {% if printer.nrc_robot_arm_executor is not defined or not printer.nrc_robot_arm_executor.is_connected %}
        NRC_CONNECT
    {% endif %}

    # 归零
    G28

    # 重置挤出机位置
    G92 E0

    # 设置单位和坐标模式
    G21  ; 毫米单位
    G90  ; 绝对坐标模式
    M83  ; 挤出机相对模式

    # 打印开始提示
    M117 打印开始...

# 打印结束宏
[gcode_macro END_PRINT]
description: 打印结束时执行的宏
gcode:
    # 抬高Z轴到安全高度
    G91  ; 相对坐标模式
    G1 Z10 F3000  ; 抬高10mm
    G90  ; 绝对坐标模式

    # 移动到安全位置
    G1 X0 Y0 F3000

    # 重置挤出机位置
    G92 E0

    # 关闭风扇
    M106 S0

    # 打印完成提示
    M117 打印完成！

# 暂停宏
[gcode_macro PAUSE]
description: 暂停打印
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    G91  ; 相对坐标模式
    G1 Z10 F3000  ; 抬高10mm
    G90  ; 绝对坐标模式
    M117 打印已暂停

# 恢复宏
[gcode_macro RESUME]
description: 恢复打印
rename_existing: RESUME_BASE
gcode:
    G91  ; 相对坐标模式
    G1 Z-10 F3000  ; 降低10mm
    G90  ; 绝对坐标模式
    RESUME_BASE
    M117 打印恢复中...

# 取消宏
[gcode_macro CANCEL_PRINT]
description: 取消打印
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE
    END_PRINT
    M117 打印已取消

# ====== 配置说明 ======
#
# 1. 软限位（Software Limits）：
#    - 打印空间定义（用户坐标系下）：
#      * X 轴：position_min_x 到 position_max_x
#      * Y 轴：position_min_y 到 position_max_y
#      * Z 轴：position_min_z 到 position_max_z
#    - 安全保证：这个空间已经过安全标定，是机械臂末端的安全工作空间
#    - Klipper 边界检查：在 check_move() 中检查，超出范围会拒绝运动
#
# 2. 机械臂自身安全机制（无需 Klipper 处理）：
#    - 自身干涉区检测：由机械臂控制器自动处理
#    - 硬件限位：由机械臂控制器自动处理
#    - 关节角度限制：由机械臂控制器自动处理
#
# 3. 归零操作：
#    - 通过 nrc_robot_arm 的边界参数实现软限位
#    - 归零操作：移动到配置的归零点（home_position_x/y/z）
#    - 机械臂控制器负责硬限位与干涉检测
#
# 4. 探针/自动调平：
#    - 当前版本不支持：采用人工调平方式（手动调整打印平台）
#    - 未来扩展：可以使用机械臂的力控功能实现 Z 探测
#
# ====== 测试命令 ======
#
# 1. 连接机械臂：
#    NRC_CONNECT
#
# 2. 测试归零：
#    G28
#
# 3. 测试挤出机（冷挤出模式，无需加热）：
#    G92 E0           # 重置挤出机位置
#    G1 E10 F300      # 挤出 10mm
#
# 4. 测试 XYZ 移动 + 挤出：
#    G1 X100 Y100 Z50 E5 F3000
#
# 5. 测试边界检查：
#    G1 X1000         # 应该报错：Move out of range
#
# 6. 测试打印文件：
#    - 上传 G-code 文件到 ~/printer_data/gcodes/
#    - 在 Mainsail/Fluidd 界面点击"打印"
#    - 或使用命令：SDCARD_PRINT_FILE FILENAME=test.gcode
#
# ====== 故障排除 ======
#
# 1. Klipper 启动失败：
#    - 检查 serial 路径是否正确
#    - 检查 robot_ip 是否正确
#    - 查看日志：~/printer_data/logs/klippy.log
#
# 2. 挤出机不工作：
#    - 检查 MCU 连接
#    - 检查引脚配置
#    - 运行 PID 校准：PID_CALIBRATE HEATER=extruder TARGET=200
#
# 3. 归零失败：
#    - 检查 home_position 配置
#    - 检查归零作业 GUILIN 是否存在
#    - 查看日志输出
#
# 4. 机械臂不动：
#    - 检查连接状态：NRC_STATUS
#    - 检查作业是否启动：job_started 应为 True
#    - 检查伺服状态：servo_state 应为 1(Ready) 或 3(Running)
#
# 5. 挤出和移动不同步：
#    - 检查 initial_timestamp_offset_ms 设置
#    - 查看首航点延迟测量日志
#    - 机械臂滞后：减小 initial_timestamp_offset_ms
#    - 机械臂超前：增大 initial_timestamp_offset_ms

# ===== NRC 机械臂轨迹执行器 =====
[nrc_robot_arm_executor]
# TrapQ 数据提取与轨迹执行器
# 此模块负责从 TrapQ 提取运动数据并发送到机械臂
#
# 工作原理：
# 1. 周期性轮询 TrapQ（10ms 间隔）
# 2. 提取已完成的运动段（10ms 安全边际）
# 3. 采样为固定时间间隔的航点（20ms 间隔）
# 4. 计算相对时间戳并通过 NRC SDK 发送到机械臂
#
# 性能参数：
# - 轮询频率：100 Hz（POLL_INTERVAL = 10ms）
# - 采样频率：50 Hz（SAMPLING_INTERVAL = 20ms）
# - 安全边际：10ms（SAFETY_MARGIN）
# - 初始延迟补偿：220ms（可配置）
#
# ===== 固定姿态配置 =====
# 机械臂末端固定姿态（单位：弧度）
# 默认配置：末端朝下（适合 3D 打印）
fixed_orientation_rx: 3.14159    # 绕 X 轴旋转（π 弧度 = 180°）
fixed_orientation_ry: 0.0        # 绕 Y 轴旋转
fixed_orientation_rz: 0.0        # 绕 Z 轴旋转
#
# 说明：
# - 固定姿态用于不需要动态姿态变化的打印场景
# - 动态姿态打印时，使用 SET_ORIENTATION 命令或 G-code ABC 参数
#
# ===== 动态姿态控制配置 =====
#
# 📖 G-code 姿态参数说明 (更新于 2025-01-26)：
#
# 【输入格式】
#   G-code 使用 A/B/C 参数控制姿态偏移：
#     G1 X100 Y100 Z10 A0 B8.8 C0 F1000
#
#   参数含义（ZYX 欧拉角顺序，与常见切片软件一致）：
#     A = 绕 X 轴旋转偏移（Roll）
#     B = 绕 Y 轴旋转偏移（Pitch）
#     C = 绕 Z 轴旋转偏移（Yaw）
#
# 【系统自动转换】
#   本系统已内置欧拉角顺序转换（gcode_move.py）：
#   - 输入：G-code 使用 ZYX 顺序（Slicer/仿真常用）
#   - 输出：NRC 机械臂使用 XYZ 顺序（机械臂基坐标系欧拉角）
#   - 转换公式：rx = 180° + A, ry = -B, rz = -C
#   - 用户无需手动转换，系统自动处理
#
# 【转换原理】
#   ZYX 顺序：R = Rz(C) @ Ry(B) @ Rx(A)  ← Slicer 输出
#   XYZ 顺序：R = Rx(rx) @ Ry(ry) @ Rz(rz)  ← 机械臂输入
#   为保持相同的工具姿态，需要对 B 和 C 取反
#
# 【使用示例】
#   基准姿态：喷头垂直向下
#     G1 X0 Y0 Z50 A0 B0 C0  → 机械臂 rx=180°, ry=0°, rz=0°
#
#   倾斜打印：喷头向 +X 方向倾斜 10°
#     G1 X0 Y0 Z50 A0 B10 C0  → 机械臂 rx=180°, ry=-10°, rz=0°
#
#   倾斜打印：喷头向 +Y 方向倾斜 10°
#     G1 X0 Y0 Z50 A-10 B0 C0  → 机械臂 rx=170°, ry=0°, rz=0°
#
# 【典型场景】
#   - 平面打印：A0 B0 C0（喷头垂直）
#   - 圆锥台打印：ABC 随位置变化，指向圆心
#   - 曲面打印：ABC 随曲面法向量变化
#
# ===== 四元数插值配置 =====
use_quaternion_interpolation: true  # 姿态插值方法：true=SLERP 球面插值（推荐）
#
# 📖 插值方法说明：
#
# true - SLERP 球面插值（推荐）：
#   - 优点：最短旋转路径，角速度连续，无万向节死锁
#   - 适用：所有姿态变化场景
#
# false - 线性插值：
#   - 优点：计算快速
#   - 缺点：大角度变化时路径非最短
#   - 适用：角度变化 < 15° 的简单场景
#
# ===== 用户坐标系配置 =====
user_coord_number: 1             # 用户坐标系编号（1-20）
#
# 说明：
# - 用户坐标系定义打印平面在机械臂基坐标系中的位置和姿态
# - 必须在机械臂示教器中预先设置用户坐标系
# - Klipper 将自动读取用户坐标系参数并进行坐标转换
# - 这是系统正常工作的前提条件
#
# 设置方法（在机械臂示教器上）：
# 1. 进入：设置 → 坐标系 → 用户坐标系 → 选择编号 1
# 2. 定义原点位置（打印床中心）和三个轴的方向
#    - 原点：打印床中心位置
#    - X 轴：打印床的 X 方向
#    - Y 轴：打印床的 Y 方向
#    - Z 轴：垂直向上（打印方向）
# 3. 保存设置
#
# 验证方法：
# 1. 执行 NRC_CONNECT（将自动读取用户坐标系）
# 2. 查看日志确认用户坐标系参数：
#    - Translation: X, Y, Z（打印床中心在基坐标系中的位置）
#    - Rotation: Rx, Ry, Rz（打印床坐标系相对于基坐标系的旋转）
# 3. 发送 G1 X0 Y0 Z0 F3000
# 4. 验证机械臂末端移动到打印床中心
# 5. 发送 G1 X100 Y100 Z50 F3000
# 6. 验证机械臂末端移动到打印床中心偏移 (100, 100, 50) 的位置
#
# 注意事项：
# - 如果用户坐标系读取失败，坐标转换将被禁用
# - 禁用坐标转换时，G-code 坐标将直接作为基坐标系坐标发送
# - 这可能导致机械臂移动到错误位置，请务必正确设置用户坐标系
#
# ===== 作业配置 =====
auto_job_name: DAYIN             # 默认作业名称（需在机械臂控制器中预先创建）
#
# 说明：
# - 作业文件必须包含"外部点"指令以接收 servo_move 数据
# - 作业启动方式（3种）：
#   方式1：手动启动 - 执行 NRC_START_JOB 命令（推荐用于调试）
#   方式2：打印触发 - 发送打印 G-code 时自动启动（推荐用于生产）
#   方式3：前端触发 - 点击"开始打印"时自动启动
#
# ===== 作业启动模式配置 =====
enable_auto_job_start: false      # 作业自动启动开关（推荐：手动启动模式）
#
# 📖 作业启动模式说明：
#
# 【推荐】手动启动模式（enable_auto_job_start: false）：
#   - 工作流程：先执行 NRC_START_JOB，再开始打印
#   - 优点：启动延迟更小（~220ms），同步质量更好
#
# 【备选】自动启动模式（enable_auto_job_start: true）：
#   - 工作流程：直接开始打印，系统自动启动作业
#   - 优点：操作简单，完全自动化
#   - 缺点：启动延迟较大（~330ms）
#
# 注意：切换启动模式时，需同步调整 initial_timestamp_offset_ms
#   - 手动启动模式：推荐 220ms
#   - 自动启动模式：推荐 330ms
#
# ===== 归零专用作业配置 =====
homing_job_name: GUILIN          # 归零专用作业名称（需在机械臂控制器中预先创建）
#
# 说明：
# - 归零操作使用专用作业 GUILIN
# - 作业要求：必须在机械臂控制器中预先创建
# - 作业内容：移动到归零点（与 home_position_x/y/z 配置一致）
#
# ===== 时间戳补偿配置 =====
initial_timestamp_offset_ms: 220.0  # 初始时间戳偏移（毫秒）
#
# 📖 时间戳补偿说明：
#
# 作用：补偿机械臂启动延迟，确保机械臂和挤出机同步运动
#
# 推荐值：
#   - 手动启动模式：220ms
#   - 自动启动模式：330ms
#
# 调整方法：
#   - 机械臂滞后于挤出：减小此值
#   - 机械臂超前于挤出：增大此值
#   - 目标：同步误差 < 50ms
#
# ===== 延迟自动调整配置 =====
enable_auto_delay_adjustment: true   # 推荐启用
delay_adjustment_threshold_ms: 50.0  # 延迟调整阈值（毫秒）
#
# 功能：自动检测机械臂启动延迟，并在日志中提供配置建议
#
# ===== 预校准配置（推荐启用）=====
enable_pre_calibration: true         # 启用预校准（自动测量实际延迟）
pre_calibration_distance_mm: 5.0     # 校准时 Z 轴移动距离（mm）
#
# 📖 预校准说明：
#
# 功能：在打印开始前自动测量机械臂响应延迟，用实测值替代人工设定的补偿值
#
# 工作流程：
#   1. NRC_START_JOB 启动作业后自动执行预校准
#   2. 发送测试航点（Z 轴移动 5mm 再返回）
#   3. 测量机械臂从接收航点到开始运动的延迟
#   4. 应用实测延迟到后续打印的时间戳计算
#
# 优点：
#   - 自动适应网络状况和机械臂负载变化
#   - 无需手动调整 initial_timestamp_offset_ms
#
# 注意：
#   - 启用预校准会增加约 2 秒的启动延迟
#   - 如果预校准失败，自动回退到 initial_timestamp_offset_ms 配置值
#
# ===== 两段式 Move 拆分配置（姿态协调优化）=====
fixed_angular_velocity: 5.0         # 固定角速度（°/s），用于计算姿态调整时间
enable_move_split: true             # 启用两段式拆分
orientation_retraction: 0.5         # 姿态调整期间的回抽量（mm）
#
# 📖 两段式拆分说明：
#
# 功能：优化姿态变化时的打印质量
#
# 工作原理：
#   1. 检测 G-code 中的姿态变化（ABC 参数）
#   2. 如果姿态变化量较大，将 Move 拆分为两段：
#      - Move 1: XYZ 移动 + 挤出，保持当前姿态
#      - Move 2: 微小移动，姿态调整 + 回抽
#   3. 回抽作用：防止姿态调整期间漏料
#
# 参数说明：
#   - fixed_angular_velocity: 固定角速度（°/s），推荐 5-10°/s
#   - orientation_retraction: 回抽量（mm），推荐 0.3-0.8mm
#   - enable_move_split: 启用开关，推荐 true
#
# ===== 连接和启动流程 =====
#
# 1. Klipper 启动：不自动连接机械臂
# 2. 用户执行 NRC_CONNECT：连接双端口（6001 + 7000），启动状态查询
# 3. 作业启动：
#    - 手动模式：先执行 NRC_START_JOB，再开始打印
#    - 自动模式：发送首个 G-code 时自动启动作业
# 4. 运动执行：作业启动后，持续发送航点数据到机械臂
#
# ===== 可用的 G-code 命令 =====
#
# NRC_CONNECT                - 连接机械臂（双端口：6001 + 7000）
# NRC_DISCONNECT             - 断开连接
# NRC_STATUS                 - 查询状态（位置、模式、速度等）
# NRC_POWER_ON               - 机械臂上电
# NRC_POWER_OFF              - 机械臂下电
# NRC_SET_MODE MODE=X        - 设置运行模式（0=示教，1=远程，2=运行）
# NRC_RESET_ERROR            - 复位错误
# NRC_START_JOB JOB_NAME=X   - 启动作业（默认作业名：DAYIN）
# NRC_PAUSE                  - 暂停机械臂运动
# NRC_RESUME                 - 恢复机械臂运动
# SET_ORIENTATION RX=X RY=Y RZ=Z  - 设置工具姿态（角度）