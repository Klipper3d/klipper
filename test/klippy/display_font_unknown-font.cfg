#valid display_font and display configuration
[mcu]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[display_font big12]
format: bdf
font_file: fonts/FreeMono-10x24-ascii.bdf
cell_width: 10
cell_height: 24
baseline: 18
charset: ascii
rows_override: 1

[display]
lcd_type: ssd1306
font: small7
